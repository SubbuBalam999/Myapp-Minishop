server:
  port: 8084

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minishop_orders}
    username: ${DB_USERNAME:minishop}
    password: ${DB_PASSWORD:minishop}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      access: unrestricted
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
