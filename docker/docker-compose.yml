services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minishop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U $${POSTGRES_USER} -d postgres &&
          test "$$(psql -U $${POSTGRES_USER} -d postgres -tAc
          "SELECT count(*) FROM pg_database WHERE datname IN
          ('minishop_users', 'minishop_products')")" -eq 2
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - minishop-network

  user-service:
    build:
      context: ../apps/user-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_users
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8081/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  product-service:
    build:
      context: ../apps/product-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_products
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8082/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: Dockerfile
    environment:
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8080/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://localhost:5173/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - minishop-network

volumes:
  postgres-data:

networks:
  minishop-network:
    name: minishop-network
    driver: bridge
