services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minishop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U $${POSTGRES_USER} -d postgres &&
          test "$$(psql -U $${POSTGRES_USER} -d postgres -tAc
          "SELECT count(*) FROM pg_database WHERE datname IN
          ('minishop_users', 'minishop_products', 'minishop_cart',
          'minishop_orders')")" -eq 4
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - minishop-network

  user-service:
    build:
      context: ../apps/user-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_users
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8081/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  product-service:
    build:
      context: ../apps/product-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_products
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8082/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  cart-service:
    build:
      context: ../apps/cart-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_cart
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8083/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  order-service:
    build:
      context: ../apps/order-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/minishop_orders
      DB_USERNAME: ${POSTGRES_USER:-minishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-minishop}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8084/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: Dockerfile
    environment:
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      CART_SERVICE_URL: http://cart-service:8083
      ORDER_SERVICE_URL: http://order-service:8084
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://localhost:8080/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - minishop-network

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
    ports:
      - "5173:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://127.0.0.1:5173/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - minishop-network

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://localhost:9090/-/healthy
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - minishop-network

  loki-init:
    image: busybox:1.37.0
    command:
      - sh
      - -c
      - chown -R 10001:10001 /tmp/loki
    volumes:
      - loki-data:/tmp/loki
    network_mode: none
    restart: "no"

  loki:
    image: grafana/loki:3.6.0
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ../logging/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/tmp/loki
    ports:
      - "3100:3100"
    depends_on:
      loki-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - minishop-network

  promtail:
    image: grafana/promtail:3.6.0
    command:
      - -config.file=/etc/promtail/promtail.yml
    volumes:
      - ../logging/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-data:/var/lib/promtail
    ports:
      - "9080:9080"
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - minishop-network

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - minishop-network

volumes:
  postgres-data:
  prometheus-data:
  loki-data:
  promtail-data:
  grafana-data:

networks:
  minishop-network:
    name: minishop-network
    driver: bridge
